name: build-deliverables

on:
  push:
    paths:
      - "data/processed/master_monthly.csv"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape BART
        run: python scrapers/agencies/bart.py

      - name: Scrape NTD
        run: python scrapers/agencies/ntd.py

      - name: Build master dataset
        run: python merge/build_master.py

      - name: Export Excel and public CSVs
        run: python export/to_excel.py

      - name: Commit and push deliverables
        run: |
          git config user.name  "bcn-transit-bot"
          git config user.email "data@baycitynews.com"
          git add data/public/
          git diff --staged --quiet || git commit -m "chore: rebuild deliverables $(date -u +%Y-%m-%d)"
          git push
