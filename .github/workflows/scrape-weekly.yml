name: scrape-weekly-full

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape BART
        run: python scrapers/agencies/bart.py

      - name: Scrape Muni
        run: python scrapers/agencies/muni.py

      - name: Scrape NTD
        run: python scrapers/agencies/ntd.py

      - name: Build master dataset
        run: python merge/build_master.py

      - name: Export Excel and public CSVs
        run: python export/to_excel.py

      - name: Check for variance flags
        run: |
          if [ -f "data/processed/_variance_flags.csv" ]; then
            echo "Variance flags found — review data/processed/_variance_flags.csv"
            cat data/processed/_variance_flags.csv
          fi

      - name: Commit and push changes
        run: |
          git config user.name  "bcn-transit-bot"
          git config user.email "data@baycitynews.com"
          git add data/processed/ data/public/ data/raw/_scrape_log.csv
          git diff --staged --quiet || git commit -m "chore: weekly full refresh $(date -u +%Y-%m-%d)"
          git push
