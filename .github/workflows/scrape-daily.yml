name: scrape-daily-bart

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape BART
        run: python scrapers/agencies/bart.py

      - name: Scrape Muni
        run: python scrapers/agencies/muni.py

      - name: Scrape SMART
        run: python scrapers/agencies/smart.py

      - name: Scrape NTD
        run: python scrapers/agencies/ntd.py

      - name: Build master dataset
        run: python merge/build_master.py

      - name: Export Excel and public CSVs
        run: python export/to_excel.py

      - name: Commit and push changes
        run: |
          git config user.name  "bcn-transit-bot"
          git config user.email "data@baycitynews.com"
          git pull --rebase origin main  
          git add data/public/
          git diff --staged --quiet || git commit -m "chore: scrape bart $(date -u +%Y-%m-%d)"
          git push
